<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plan zajęć</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Sticky Header v2 -->
  <header class="top-bar">
    <div class="header-info">
      <h1 id="headerSubject">Brak zajęć</h1>
      <p id="headerRoom">—</p>
    </div>
    <!-- <button class="cog">⚙️</button> -->
  </header>

  <!-- Niebieski widget -->
  <section id="nowWidget" class="now-section hidden">
    <div class="now-card">
      <div class="now-card-header">
        <div class="now-widget-wrapper">
          <div class="now-type">Trwa teraz</div>
          <div id="nowTitle" class="now-title">---</div>
        </div>
        <div id="nowTime" class="now-time">--:--</div>
      </div>
      <div class="progress-container">
        <div id="progressBar"></div>
      </div>
    </div>
  </section>

  <!-- Dni -->
  <div class="day-switcher">
    <button data-day="friday">Piątek</button>
    <button data-day="saturday">Sobota</button>
    <button data-day="sunday">Niedziela</button>
  </div>

  <!-- Plan -->
  <main id="schedule"></main>

  <!-- Bottom Nav -->
  <nav class="bottom-bar">
    <div class="nav-pill">
      <a href="index.html" class="nav-link" data-view="schedule">
        <span class="nav-pill--selected">Strona główna</span>
      </a>

    </div>

        <div class="nav-pill-blue" id="nowWidget">
       <div class="now-card-header">
        <div class="now-widget-wrapper">
          <div class="now-type">Trwa teraz</div>
          <div id="nowTitle" class="now-title">---</div>
        </div>
        <div id="nowTime" class="now-time">--:--</div>
      </div>

    </div>
    
  </nav>
  <script src="script.js"></script>
</body>
</html>
